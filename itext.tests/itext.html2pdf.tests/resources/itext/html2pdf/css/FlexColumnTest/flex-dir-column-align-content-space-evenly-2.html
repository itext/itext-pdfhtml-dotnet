<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>column + align-content: space-evenly</title>
<style>
  .container {
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    align-content: space-evenly;
	width: 800px;
	height: 4000px;



    padding: 10px;
    border: 2px solid #222;
    box-sizing: border-box;
  }
  .item{
	border: 2px solid #fff;
    width: 300px;
    height: 400px;
    background-color: #D81B60;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .item:nth-child(4) { width: 180px; }
  .item:nth-child(9) { height: 120px; }
  .item:nth-child(13) { width: 170px; height: 90px; }
  .item:nth-child(19) { width: 140px; height: 110px; }
  
  #empty {
    height: 1000px;
	}
</style>
</head>
<body>
  <div id="empty"></div>
  <div class="container">
    <div class="item">1</div><div class="item">2</div><div class="item">3</div><div class="item">4</div>
<div class="item">5</div><div class="item">6</div>
  </div>
</body>
</html>
