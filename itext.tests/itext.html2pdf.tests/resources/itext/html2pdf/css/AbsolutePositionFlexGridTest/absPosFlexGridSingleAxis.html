<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>flex grid single axis</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 600px;
    background: #fafbfc;
    font-family: monospace;
    font-size: 11px;
  }

  .flex-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    width: 460px;
    height: 160px;
    background: #cbd5e1;
    padding: 10px;
    gap: 10px;
    margin-bottom: 20px;
  }

  .flex-sibling {
    background: #94a3b8;
    color: white;
    padding: 8px;
    width: 90px;
    height: 50px;
  }

  .absolute-left-only-flex {
    position: absolute;
    left: 30px;
    width: 110px;
    background: #2563eb;
    color: white;
    padding: 6px 8px;
  }

  .grid-container {
    position: relative;
    display: grid;
    grid-template-columns: repeat(2, 180px);
    grid-template-rows: 120px;
    justify-items: center;
    align-items: center;
    gap: 12px;
    width: 400px;
    background: #cbd5e1;
    padding: 10px;
  }

  .grid-cell {
    background: #94a3b8;
    color: white;
    padding: 6px;
  }

  .absolute-top-only-grid {
    position: absolute;
    grid-column: 2;
    grid-row: 1;
    top: 10px;
    width: 90px;
    background: #db2777;
    color: white;
    padding: 6px;
  }
</style>
</head>
<body>
  <div class="flex-container">
    <div class="flex-sibling">sibling</div>
    <div class="absolute-left-only-flex">left:30px only<br>(top/bottom via<br>align-items:flex-end)</div>
    <div class="flex-sibling">sibling</div>
  </div>

  <div class="grid-container">
    <div class="grid-cell">cell A1</div>
    <div class="absolute-top-only-grid">top:10px only<br>(left/right via<br>justify-items:center)</div>
  </div>
</body>
</html>
