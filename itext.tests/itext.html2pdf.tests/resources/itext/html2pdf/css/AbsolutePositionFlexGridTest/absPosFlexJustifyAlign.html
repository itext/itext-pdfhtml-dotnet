<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>justify content align items</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 600px;
    background: #fafbfc;
    font-family: monospace;
    font-size: 12px;
  }

  .flex-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 500px;
    height: 160px;
    background: #cbd5e1;
    padding: 10px;
    margin-bottom: 20px;
    gap: 10px;
  }

  .flex-item {
    background: #94a3b8;
    color: white;
    padding: 8px;
  }

  .absolute-no-offset {
    position: absolute;
    background: #2563eb;
    color: white;
    padding: 8px;
  }

  .flex-container-2 {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 500px;
    height: 160px;
    background: #cbd5e1;
    padding: 10px;
  }

  .absolute-align-self {
    position: absolute;
    align-self: flex-start;
    background: #db2777;
    color: white;
    padding: 8px;
  }
</style>
</head>
<body>
  <div class="flex-container">
    <div class="flex-item">flex item A</div>
    <div class="absolute-no-offset">absolute, no offsets<br>justify-content:center<br>align-items:center</div>
    <div class="flex-item">flex item B</div>
  </div>

  <div class="flex-container-2">
    <div class="flex-item">item A</div>
    <div class="absolute-align-self">absolute<br>align-self:flex-start<br>(container align-items:flex-end)</div>
    <div class="flex-item">item B</div>
  </div>
</body>
</html>
