<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
<!-- U+6A is 'j', U+75 is 'u' -->
        @font-face {
            font-family: 'Roboto Italic';
            src: url("../../fonts/RobotoSerif-Italic.ttf");
            unicode-range:U+6A;
        }

        @font-face {
            font-family: 'Roboto Bold';
            src: url("../../fonts/RobotoSerif-Bold.ttf");
            unicode-range:U+75;
        }

        div.robotoitalic {
            font-family: 'Roboto Italic';
        }

        div.robotobold {
            font-family: 'Roboto Bold';
        }

        div {
            font-size: 4em;
        }
    </style>
</head>
<body>
<div class="robotobold">j</div>
<div class="robotoitalic">u</div>

</body>
</html>
