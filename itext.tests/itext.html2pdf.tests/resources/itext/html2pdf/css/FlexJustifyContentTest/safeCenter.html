<!doctype html>
<html lang="en">
<head>
  <title>Safe center</title>
  <style>
    .container {
	  margin-left: 50px;
      margin-bottom: 20px;
	  background-color: lightblue;
	  display: flex;
      border: 2px solid #444;
      height: 50px;
      width: 350px;
	  align-items: baseline;
	}

	div {
	  line-height: 1em;
	  border: 1px solid;
	  box-sizing: border-box;
	  text-align: center;
	  background-color: pink;
	  flex: 0 0 100px;
	}
  </style>
</head>
<body>
  <h1>Center</h1>

  <div class="container" style="justify-content: center">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>

  <h1>safe center</h1>
  <div class="container" style="justify-content: safe center">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>

  <h1>safe center 3 elements</h1>
  <div class="container" style="justify-content: safe center">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>
</body>
</html>
