<!doctype html>
<html lang="en">
<head>
  <title>Flexbox flex-shrink demo</title>
  <style>
    body {font-family: sans-serif; margin: 20px;}
    .stage {
      display: flex;
      border: 1px solid #ccc;
      gap: 10px;
      width: 400px; 
    }
    .box {
      background: lightgreen;
      border: 1px solid #333;
      text-align: center;
      height: 100px;
      width: 200px;
      flex-shrink: 2; 
    }
    .biggerBox {
      background-color: red;
      width: 200px;
      height: 150px;
      flex-shrink: 0; 
    }
  </style>
</head>
<body>
  <h1>Flex-shrink demo</h1>

  <h2>justify-content: space-between</h2>
  <div class="stage" style="justify-content:space-between;">
    <div class="box" style="width: 120px; height: 50px;">Item 1</div>
    <div class="box biggerBox">Item 2</div>
    <div class="box">Item 3</div>
  </div>
  
  <h2>justify-content: space-around</h2>
  <div class="stage" style="justify-content:space-around;">
    <div class="box" style="width: 120px; height: 50px;">Item 1</div>
    <div class="box">Item 2</div>
    <div class="box biggerBox">Item 3</div>
  </div>
  
  <h2>justify-content: space-evenly</h2>
  <div class="stage" style="justify-content:space-evenly;">
    <div class="box biggerBox">Item 1</div>
    <div class="box">Item 2</div>
    <div class="box" style="width: 120px; height: 50px;">Item 3</div>
  </div>

</body>
</html>
