<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flexbox justify-content: space-around</title>
  <style>
    body {font-family: sans-serif; margin: 20px;}
    .stage {display: flex; justify-content: space-around; border: 1px solid #ccc;}
    .box {background: lightblue; padding: 20px; border: 1px solid #333;}
  </style>
</head>
<body>
  <h1>justify-content: space-around</h1>
  <div class="stage">
    <div class="box" style="width: 200px; height: 30px;">Item 1</div>
    <div class="box" style="width: 20px; height: 190px;">Item 2</div>
    <div class="box">Item 3</div>
  </div>
</body>
</html>
