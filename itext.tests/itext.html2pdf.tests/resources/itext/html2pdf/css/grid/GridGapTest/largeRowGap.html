<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>row-gap: 80px</title>
<style>
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    row-gap: 80px;
    border: 2px solid black;
    width: 400px;
  }
  .item {
    background: lightgreen;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>
<h1>row-gap: 80px</h1>
<div class="container">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
</div>
</body>
</html>
