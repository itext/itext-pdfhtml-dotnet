<!doctype html>
<html lang="en">
<head>
  <title>RTL Grid 30 items, 3 rows, different gaps, order</title>
  <style>
    body {
      margin: 20px;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(3, 1fr); 
      grid-auto-flow: column; 
      column-gap: 50px; 
      row-gap: 30px;
      border: 2px solid #000;
      width: 700px;
      height: 400px;
    }

    .item {
      background: lightcoral;
      border: 1px solid #333;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>RTL Grid, 30 items, 3 rows, varying gaps, with order</h2>
  <div class="grid">
    <div class="item" style="order: 5;">1 (order 5)</div>
    <div class="item" style="order: 1;">2 (order 1)</div>
    <div class="item" style="order: 3;">3 (order 3)</div>
    <div class="item" style="order: 2;">4 (order 2)</div>
    <div class="item" style="order: 6;">5 (order 6)</div>
    <div class="item" style="order: 0;">6 (order 0)</div>
    <div class="item" style="order: 4;">7 (order 4)</div>
    <div class="item" style="order: -1;">8 (order -1)</div>
    <div class="item" style="order: 2;">9 (order 2)</div>
    <div class="item" style="order: 3;">10 (order 3)</div>
  </div>
</body>
</html>
