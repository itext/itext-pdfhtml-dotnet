<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Grid-column 1 / 1</title>
  <style>
    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      border: 2px solid black;
    }
    .item {
      background: lightblue;
      text-align: center;
      padding: 20px;
    }
    .special {
      background: tomato;
      grid-column: 1 / 1;
    }
  </style>
</head>
<body>
  <h1>grid-column: 1 / 1</h1>
  <div class="container">
    <div class="item">A</div>
    <div class="item special">B (1 / 1)</div>
    <div class="item">C</div>
    <div class="item">D</div>
  </div>
</body>
</html>
