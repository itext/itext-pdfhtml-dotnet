<!DOCTYPE html>
<html>
<body>
<p>Flex item with child text</p>
<div style="display: flex; height: 200px; width: 200px; background-color: green; margin-top: 50px">
    <div style="width: 100px; background-color: grey; margin: 20px">correct</div>
</div>
<p>Flex item with child paragraph</p>
<div style="display: flex; height: 200px; width: 200px; background-color: green; margin-top: 50px">
    <div style="width: 100px; background-color: grey; margin: 20px"><p>correct</p></div>
</div>
<p>Flex item without child</p>
<div style="display: flex; height: 200px; width: 200px; background-color: green; margin-top: 50px">
    <div style="width: 100px; background-color: grey; margin: 20px"></div>
</div>
</body>
</html>
