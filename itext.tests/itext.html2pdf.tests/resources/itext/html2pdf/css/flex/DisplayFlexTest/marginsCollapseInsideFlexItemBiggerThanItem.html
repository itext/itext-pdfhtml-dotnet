<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            display: flex;
            height: 600px;
            width: 600px;
            flex-wrap: wrap;
            background-color: green;
        }

        .item {
            width: 200px;
            height: 200px;
            background-color: red;
            margin: 50px;
        }

        .item-child {
            width: 50px;
            height: 50px;
            background-color: blue;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="item">
        <div class="item-child" style="margin-top: 62px"></div>
        <div class="item-child" style="margin-top: 62px"></div>
    </div>
    <div class="item">
        <div class="item-child" style="margin-bottom: 20px"></div>
        <div class="item-child" style="margin-top: 125px"></div>
    </div>
    <div class="item">
        <div class="item-child" style="margin-bottom: 125px"></div>
        <div class="item-child" style="margin-top: 20px"></div>
    </div>
</div>
</body>
</html>
