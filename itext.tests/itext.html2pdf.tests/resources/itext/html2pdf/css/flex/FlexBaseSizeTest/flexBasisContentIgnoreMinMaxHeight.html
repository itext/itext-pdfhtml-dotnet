<!DOCTYPE html>
<html lang="en">
<body>
<div style="display: flex; flex-wrap: wrap; flex-direction: column; height: 400px; border: 3px solid olive;">
    <div style=" flex-basis: content; border: 3px solid darkseagreen;">
        Default: with single line content
    </div>
    <div style=" flex-basis: content; min-height: 100px; max-height: 45%; border: 3px solid orange;">
        With min/max height: first item,<br> min-height: 100px; max-height: 45%
    </div>
    <div style=" flex-basis: content; min-height: 45%; max-height: 100px; border: 3px solid rebeccapurple;">
        second item,<br> min-height: 45%; max-height: 100px;
    </div>
    <div style=" flex-basis: content; min-height: 100px; max-height: 120%; border: 3px solid orange;">
        third item,<br> min-height: 100px; max-height: 120%
    </div>
    <div style=" flex-basis: content; min-height: 120%; max-height: 100px; border: 3px solid rebeccapurple;">
        fourth item,<br> min-height: 120%;<br> max-height: 100px
    </div>
</div>
</body>
</html>
