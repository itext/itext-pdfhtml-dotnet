<!DOCTYPE html>
<html lang="en">
<body>
<p>Max-content: </p>
<div style="display: flex; flex-direction: column; width: 30px; border: 3px solid pink;">
    <div style="flex-basis: auto; height: max-content; border: 3px solid palevioletred;">
        flex-basis = max-content
    </div>
</div>
<div style="display: flex; flex-direction: column; width: 60px; border: 3px solid lightblue;">
    <div style="flex-basis: auto; height: max-content; border: 3px solid lightcyan;">
        flex-basis = max-content
    </div>
</div>
<div style="display: flex; flex-direction: column; width: 300px; border: 3px solid #bbbbff;">
    <div style="flex-basis: auto; height: max-content; border: 3px solid plum;">
        flex-basis = max-content
    </div>
</div>
<p>Min-content: </p>

        flex-basis = min-content
    </div>
</div>

</div>
<div style="display: flex; flex-direction: column; width: 300px; border: 3px solid #bbbbff;">
    <div style="flex-basis: auto; height: fit-content; border: 3px solid plum;">
        flex-basis = fit-content
    </div>
</div>
</body>
</html>
