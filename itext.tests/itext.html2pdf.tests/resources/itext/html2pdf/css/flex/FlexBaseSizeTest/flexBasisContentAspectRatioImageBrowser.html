<!DOCTYPE html>
<html>
<body>
<p>Row direction:</p>
<div style="display: flex; flex-direction: row; align-items: flex-start; width: 200px; border: 5px solid lightcyan;">
    <img style="flex-basis: content; border: 5px solid mistyrose;" alt="60x60 image" src="../img/60x60-green.png"/>
    <img style="flex-basis: content; border: 5px solid lavender;" alt="60x60 image" src="../img/60x60-green.png"/>
    <img style="flex-basis: content; border: 5px solid lightpink; height: 100px; min-width: 0" alt="60x60 image" src="../img/60x60-green.png"/>
</div>
<p>Column direction:</p>
<div style="display: flex; flex-direction: column; align-items: flex-start; width: 200px; border: 5px solid lightcyan;">
    <img style="flex-basis: content; border: 5px solid mistyrose;" alt="60x60 image" src="../img/60x60-green.png"/>
    <img style="flex-basis: content; border: 5px solid lavender; width: 100px" alt="60x60 image" src="../img/60x60-green.png"/>
    <img style="flex-basis: content; border: 5px solid lightpink;" alt="60x60 image" src="../img/60x60-green.png"/>
</div>
<p>Nested container with no width:</p>
<div style="display: flex; width: 200px; border: 5px solid #cce5ff">
    <div style="display: flex; flex-direction: row; align-items: flex-start; border: 5px solid lightcyan;">
        <img style="flex-basis: content; border: 5px solid mistyrose;" alt="60x60 image" src="../img/60x60-green.png"/>
        <img style="flex-basis: content; border: 5px solid lavender;" alt="60x60 image" src="../img/60x60-green.png"/>
        <img style="flex-basis: content; border: 5px solid lightpink; height: 100px; min-width: 0" alt="60x60 image" src="../img/60x60-green.png"/>
    </div>
</div>
</body>
</html>
