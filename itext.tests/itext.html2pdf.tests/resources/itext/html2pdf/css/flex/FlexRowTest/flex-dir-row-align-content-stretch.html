<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>row + align-content: stretch</title>
<style>
  .container {
    display: flex;
    flex-direction: row;
    align-content: stretch;
    flex-wrap: wrap;


    padding: 10px;
    border: 2px solid #000;
    box-sizing: border-box;
  }
  .item{
border: 2px solid #fff;
    width: 150px;
    background: #009688;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1 1 auto;
    min-height: 100px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="item">1</div><div class="item">2</div><div class="item">3</div><div class="item">4</div>
<div class="item">5</div><div class="item">6</div><div class="item">7</div><div class="item">8</div>

</div>
</body>
</html>
