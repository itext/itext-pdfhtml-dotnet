<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nested Flex in OL</title>
<style>
ol {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  width: 400px;
  border: 2px solid #333;
  list-style: none;
}
li {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  width: 180px;
  height: 100px;
  background: lightblue;
  border: 1px solid #666;
}
li div {
  display: flex;
  width: 80px;
  height: 40px;
  background: lightcoral;
  border: 1px solid #333;
}
</style>
</head>
<body>
<ol>
  <li><div>1</div><div>2</div><div>3</div><div>4</div></li>
  <li><div>5</div><div>6</div><div>7</div><div>8</div></li>
  <li><div>9</div><div>10</div><div>11</div><div>12</div></li>
  <li><div>13</div><div>14</div><div>15</div><div>16</div></li>
</ol>
</body>
</html>
