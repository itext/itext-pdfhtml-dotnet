<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wide OL</title>
<style>
ol {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  width: 2000px;
  height: 300px;
  border: 2px solid #333;
  background: #fafad2;
}
li.item {
  width: 200px;
  height: 60px;
  background: lightgoldenrodyellow;
  border: 1px solid #666;
}
</style>
</head>
<body>
<ol>
  <li class="item">1</li><li class="item">2</li><li class="item">3</li>
  <li class="item">4</li><li class="item">5</li><li class="item">6</li>
  <li class="item">7</li><li class="item">8</li><li class="item">9</li>
  <li class="item">10</li><li class="item">11</li><li class="item">12</li>
</ol>
</body>
</html>
