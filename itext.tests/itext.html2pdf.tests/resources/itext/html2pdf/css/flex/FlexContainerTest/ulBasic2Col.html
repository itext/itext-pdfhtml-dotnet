<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>UL as Flex Container</title>
<style>
  ul {
    display: flex;
    gap: 10px;
    border: 2px solid #333;
    padding: 10px;
    width: 260px;
    flex-wrap: wrap;
    background: #f9f9f9;
    margin-bottom: 30px;
  }

  li {
    background: lightblue;
    padding: 10px;
    border: 1px solid #666;
    flex: 0 0 100px;
  }
</style>
</head>
<body>

<ul>
  <li>Item 1</li>
  <li>Item 2</li>
  <li>Item 3</li>
  <li>Item 4</li>
  <li>Item 5</li>
  <li>Item 6</li>
  <li>Item 7</li>
  <li>Item 8</li>
</ul>

</body>
</html>
