<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex Align-Items P</title>
<style>
p {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  width: 260px;
  height: 300px;
  border: 2px solid #333;
  background: #f9f9f9;
}
span.item {
  display: inline-flex; 
  width: 100px;
  height: auto; /* allow stretch */
  background: lightblue;
  border: 1px solid #666;
}
</style>
</head>
<body>

<p style="align-items: flex-start;">
  <span class="item">1</span><span class="item">2</span><span class="item">3</span>
  <span class="item">4</span><span class="item">5</span><span class="item">6</span>
</p>

<p style="align-items: flex-end;">
  <span class="item">1</span><span class="item">2</span><span class="item">3</span>
  <span class="item">4</span><span class="item">5</span><span class="item">6</span>
</p>

<p style="align-items: center;">
  <span class="item">1</span><span class="item">2</span><span class="item">3</span>
  <span class="item">4</span><span class="item">5</span><span class="item">6</span>
</p>

<p style="align-items: baseline;">
  <span class="item">1</span><span class="item">2</span><span class="item">3</span>
  <span class="item">4</span><span class="item">5</span><span class="item">6</span>
</p>

<p style="align-items: stretch;">
  <span class="item">1</span><span class="item">2</span><span class="item">3</span>
  <span class="item">4</span><span class="item">5</span><span class="item">6</span>
</p>

</body>
</html>
