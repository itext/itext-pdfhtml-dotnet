<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex justify-Content LI Container</title>
<style>
ul {
  width: 260px;
  height: 180px;
  border: 2px solid #333;
  background: #f9f9f9;
  padding: 0;
  margin: 0 0 20px 0;
}

li {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  width: 100%;
  height: 100%;
  border: 1px solid #666;
  margin-bottom: 10px;
}

div.item {
  width: 100px;
  height: 40px;
  background: lightblue;
  display: flex;
}

</style>
</head>
<body>

<ul>
  <li style="justify-content: flex-start;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="justify-content: flex-end;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="justify-content: center;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="justify-content: space-between;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="justify-content: space-around;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="justify-content: space-evenly;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

</body>
</html>
