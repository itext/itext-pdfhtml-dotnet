<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex Align-Content LI Container</title>
<style>
ul {
  width: 260px;
  height: 180px;
  border: 2px solid #333;
  background: #f9f9f9;
  padding: 0;
  margin: 0 0 20px 0;
}

li {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  width: 100%;
  height: 100%;
  border: 1px solid #666;
  margin-bottom: 10px;
}

div.item {
  width: 100px;
  height: 40px;
  background: lightblue;
  display: flex;
  justify-content: center;
  align-items: center;
  border: 1px solid #999;
}

.stretch div.item {
  height: auto;
}
</style>
</head>
<body>

<ul>
  <li style="align-content: flex-start;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="align-content: flex-end;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="align-content: center;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="align-content: space-between;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="align-content: space-around;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li style="align-content: space-evenly;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>

  <li class="stretch" style="align-content: stretch; height: 180px;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </li>
</ul>

</body>
</html>
