<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex Gap + Reverse Wrap + Space-Between</title>
<style>
  body {
    font-family: sans-serif;
    padding: 20px;
  }

  .container {
    display: flex;
    flex-wrap: wrap-reverse;       
    justify-content: space-evenly; 
    gap: 10px;                      
    width: 600px;                  
    border: 2px solid #333;
    padding: 10px;
    background: #f9f9f9;
  }

  .item {
    width: 150px;
    height: 75px;
    background: lightcoral;
    border: 1px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item" style="height: 200px;">height: 200px</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item" style="height: auto;">Height is set to auto in here so we add some extra text to see some visible change.</div>
  <div class="item">8</div>
  <div class="item">9</div>
  <div class="item">10</div>
  <div class="item" style="margin: 20px;">margin: 20px</div>
  <div class="item">12</div>
  <div class="item">13</div>
  <div class="item">14</div>
  <div class="item" style="padding-top: 30px;">padding-top: 30px</div>
  <div class="item">16</div>
  <div class="item">17</div>
  <div class="item">18</div>
  <div class="item">19</div>
  <div class="item">20</div>
  <div class="item">21</div>
  <div class="item">22</div>
  <div class="item">23</div>
  <div class="item">24</div>
  <div class="item">25</div>
</div>

</body>
</html>
