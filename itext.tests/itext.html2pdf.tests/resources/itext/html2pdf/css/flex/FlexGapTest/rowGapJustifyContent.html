<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex Gap + Justify-Content Demo</title>
<style>
  .sample {
    border: 2px solid #333;
    margin-bottom: 30px;
    padding: 10px;
    width: 400px;
    height: 200px; 
    display: flex;
    flex-wrap: wrap; 
    row-gap: 50px;      
    background: #f9f9f9;
  }

  .sample h3 {
    margin: 0 0 5px 0;
    font-size: 14px;
  }

  .item {
    width: 60px;
    height: 60px;
    background: lightcoral;
    border: 1px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>
</head>
<body>
<div class="sample" style="justify-content: flex-start;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="justify-content: flex-end;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="justify-content: center;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="justify-content: space-between;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="justify-content: space-around;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="justify-content: space-evenly;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

</body>
</html>
