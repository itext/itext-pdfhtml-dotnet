<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex Gap + Nested Flex Containers</title>
<style>
  .outer {
    display: flex;
    flex-wrap: wrap;
    gap: 20px; 
    border: 2px solid #333;
    width: 600px;
    background: #f9f9f9;
  }

  .inner {
    display: flex;
    flex-wrap: wrap;
    border: 2px dashed #666;
    padding: 5px;
    background: lightgreen;
    width: 200px;
  }

  .inner-with-gap {
    display: flex;
    flex-wrap: wrap;
    border: 2px dashed #666;
    padding: 5px;
    background: lightblue;
    width: 400px;
	height: 250px;
	gap: 20%;
  }

  .item {
    width: 80px;
    height: 60px;
    background: lightcoral;
    border: 1px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    text-align: center;
  }
</style>
</head>
<body>
<div class="outer">
  <div class="inner">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
  </div>
  <div class="inner">
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </div>
  <div class="inner-with-gap">
    <div class="item">7</div>
    <div class="item">8</div>
    <div class="item">9</div>
  </div>
</div>

</body>
</html>
