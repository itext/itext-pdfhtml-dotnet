<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex Gap + Align-Items Demo</title>
<style>
  .sample {
    border: 2px solid #333;
    margin-bottom: 30px;
    padding: 10px;
    width: 400px;
    height: 200px; 
    display: flex;
    flex-wrap: wrap;    
    gap: 10px;          
    background: #f9f9f9;
  }

  .sample h3 {
    margin: 0 0 5px 0;
    font-size: 14px;
  }

  .item {
    width: 80px;
    height: 50px;
    background: lightcoral;
    border: 1px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 14px;
    font-weight: bold;
  }
</style>
</head>
<body>
<div class="sample" style="align-items: flex-start;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="align-items: flex-end;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="align-items: center;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
  <div class="item">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
  <div class="item">7</div>
  <div class="item">8</div>
</div>

<div class="sample" style="align-items: baseline;">
  <div class="item" style="font-size: 12px;">1</div>
  <div class="item" style="font-size: 16px;">2</div>
  <div class="item" style="font-size: 20px;">3</div>
  <div class="item" style="font-size: 14px;">4</div>
  <div class="item" style="font-size: 14px;">5</div>
  <div class="item" style="font-size: 14px;">6</div>
  <div class="item" style="font-size: 14px;">7</div>
  <div class="item" style="font-size: 14px;">8</div>
</div>
</body>
</html>
