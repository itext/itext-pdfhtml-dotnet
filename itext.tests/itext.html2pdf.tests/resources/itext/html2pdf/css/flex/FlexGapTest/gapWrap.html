<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flex Gap + Wrap Demo</title>
<style>
  .sample {
    border: 2px solid #333;
    margin-bottom: 30px;
    padding: 10px;
    width: 400px;
    height: 200px;
    display: flex;
    gap: 10px;
    background: #f9f9f9;
  }

  .sample h3 {
    margin: 0 0 5px 0;
    font-size: 14px;
  }

  .item {
    width: 80px;
    height: 50px;
    background: lightcoral;
    border: 1px solid #333;
    display: flex;
  }
</style>
</head>
<body>
  <h3>flex-wrap: wrap</h3>

	<div class="sample" style="flex-wrap: wrap;">
	  <div class="item">1</div>
	  <div class="item">2</div>
	  <div class="item">3</div>
	  <div class="item">4</div>
	  <div class="item">5</div>
	  <div class="item">6</div>
	</div>

  <h3>flex-wrap: wrap-reverse</h3>

	<div class="sample" style="flex-wrap: wrap-reverse;">
	  <div class="item">1</div>
	  <div class="item">2</div>
	  <div class="item">3</div>
	  <div class="item">4</div>
	  <div class="item">5</div>
	  <div class="item">6</div>
	</div>

  <h3>flex-wrap: no-wrap</h3>

	<div class="sample" style="flex-wrap: no-wrap;">
	  <div class="item">1</div>
	  <div class="item">2</div>
	  <div class="item">3</div>
	  <div class="item">4</div>
	  <div class="item">5</div>
	  <div class="item">6</div>
	</div>

</body>
</html>
