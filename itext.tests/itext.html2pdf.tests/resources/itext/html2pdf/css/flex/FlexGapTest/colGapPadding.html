<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Row-gap with padding (Flex)</title>
<style>
  .container {
	  display: flex;
	  column-gap: 100px;
	  border: 2px solid black;
	  flex-flow: row wrap;
	  width: 500px;
	}
	.item {
	  background: lightcoral; 
	  border: 2px solid #333; 
	  height: 100px; 
	  padding: 80px;
	  
	}
</style>
</head>
<body>
  <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>
  </div>
</body>
</html>
