<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Gap + Align-Content Demo</title>
    <style>
        .sample {
            border: 2px solid #333;
            margin-bottom: 30px;
            width: 400px;
            height: 250px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            background: #f9f9f9;
        }

        .sample h3 {
            margin: 0 0 5px 0;
        }

        .item {
            width: 80px;
            height: 50px;
            background: lightcoral;
            border: 1px solid #333;
            display: flex;
        }
    </style>
</head>
<body>
<p style="height: 830px">Paragraph</p>
<div class="sample" style="align-content: flex-start;">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>
    <div class="item">9</div>
    <div class="item">10</div>
    <div class="item">11</div>
    <div class="item">12</div>
</div>
</body>
</html>
