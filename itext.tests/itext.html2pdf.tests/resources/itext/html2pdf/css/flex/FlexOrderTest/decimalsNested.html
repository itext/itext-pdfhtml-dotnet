<!doctype html>
<html lang="en">
<head>
  <title>Flexbox Order Example</title>
  <style>
    body {font-family: sans-serif;}
    .container {
      display: flex;
      border: 2px solid #444;
      width: 600px;
      height: 150px;
    }
    .box {
      flex: 1;
      background: lightblue;
      border: 1px solid #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Flexbox: order property</h1>

  <div class="container">
    <div class="box" style="order: 3;">1 (order 3)</div>
    <div class="box" style="order: 1;">2 (order 1)</div>
	<div class="container" style="order: 5; border: 3px solid red;">
		<div class="box" style="order: 3;">1 (order 3)</div>
		<div class="box" style="order: 1;">2 (order 1) - red nested container (order 5)</div>
		<div class="box" style="order: 2;">3 (order 2)</div>
		<div class="box" style="order: 4;">4 (order 4)</div>
	</div>
    <div class="box" style="order: 2;">3 (order 2)</div>
    <div class="box" style="order: 4;">4 (order 4)</div>
  </div>

</body>
</html>
