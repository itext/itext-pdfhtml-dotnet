<!doctype html>
<html lang="en">
<head>
  <title>Flexbox Order: inherit</title>
  <style>
    body {font-family: sans-serif;}
    .container {
      display: flex;
      border: 2px solid #444;
      width: 700px;
      height: 150px;
    }
    .box {
      flex: 1;
      background: lightblue;
      border: 1px solid #333;
      text-align: center;
      display: flex;
    }
  </style>
</head>
<body>
  <h1>Flexbox: order special keyword values</h1>

  <h2>order: inherit</h2>
  <div class="container" style="order: 3;">
    <div class="box" style="order: -1;">1 (order: -1)</div>
    <div class="box" style="order: inherit;">2 (order: inherit → 3)</div>
    <div class="box" style="order: 1;">3 (order: 1)</div>
  </div>

</body>
</html>
