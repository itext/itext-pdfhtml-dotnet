<!doctype html>
<html lang="en">
<head>
  <title>Flexbox Order: inherit, initial, revert, revert-layer, unset</title>
  <style>
    body {font-family: sans-serif;}
    .container {
      display: flex;
      border: 2px solid #444;
      width: 700px;
      height: 150px;
      margin-bottom: 40px;
	  order : -1;
    }
    .box {
      flex: 1;
      background: lightblue;
      border: 1px solid #333;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      display: flex;
	  order: 8;
    }
  </style>
</head>
<body>
  <h1>Flexbox: order special keyword values</h1>

  <h2>order: revert</h2>
  <div class="container">
    <div class="box" style="order: 2;">1 (order: 2)</div>
    <div class="box" style="order: 1;">2 (order: 1)</div>
    <div class="box" style="order: revert;">3 (order: revert → 0)</div>
  </div>
</body>
</html>
