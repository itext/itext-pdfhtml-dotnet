<!doctype html>
<html lang="en">
<head>
  <title>Flexbox justify-content with container padding, margins, and borders</title>
  <style>
    body {font-family: sans-serif;}
    .container {
      display: flex;
      border: 2px solid #444;
	  width: 700px;
    }
    .box {
      background: lightgreen;
      padding: 20px;
      border: 10px solid blue; 
      width: 60px;
      text-align: center;
      margin: 30px; 
    }
  </style>
</head>
<body>
  <h1>Flexbox justify-content with container padding, item margins, and borders</h1>

  <h2>justify-content: space-around</h2>
  <div class="container" style="justify-content: space-around;">
    <div class="box" style="width: 200px; height: 130px;">1</div>
    <div class="box">2</div>
    <div class="box" style="width: 150px; height: 30px;">3</div>
  </div>

  <h2>justify-content: space-between</h2>
  <div class="container" style="justify-content: space-between;">
    <div class="box">1</div>
    <div class="box" style="width: 150px; height: 30px;">2</div>
    <div class="box" style="width: 70px; height: 90px;">3</div>
  </div>

  <h2>justify-content: space-evenly</h2>
  <div class="container" style="justify-content: space-evenly;">
    <div class="box" style="width: 150px; height: 30px;">1</div>
    <div class="box">2</div>
    <div class="box" style="width: 30px; height: 150px;">3</div>
  </div>
</body>
</html>
