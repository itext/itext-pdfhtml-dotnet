<!doctype html>
<html lang="en">
<head>
  <title>Flexbox justify-content examples</title>
  <style>
    body {font-family: sans-serif; margin: 20px;}
    .example {margin-bottom: 40px;}
    .stage {display: flex; border: 1px solid #ccc;}
    .box {background: lightblue; padding: 20px; border: 1px solid #333;}
    h2 {margin-bottom: 10px;}
  </style>
</head>
<body>
  <h1>Flexbox justify-content examples</h1>

  <div class="example">
    <h2>space-evenly</h2>
    <div class="stage" style="justify-content: space-evenly;">
      <div class="box">Item 1</div>
      <div class="box">Item 2</div>
      <div class="box">Item 3</div>
    </div>
  </div>

  <div class="example">
    <h2>space-around</h2>
    <div class="stage" style="justify-content: space-around;">
      <div class="box">Item 1</div>
      <div class="box">Item 2</div>
      <div class="box">Item 3</div>
    </div>
  </div>

  <div class="example">
    <h2>space-between</h2>
    <div class="stage" style="justify-content: space-between;">
      <div class="box">Item 1</div>
      <div class="box">Item 2</div>
      <div class="box">Item 3</div>
    </div>
  </div>

</body>
</html>
