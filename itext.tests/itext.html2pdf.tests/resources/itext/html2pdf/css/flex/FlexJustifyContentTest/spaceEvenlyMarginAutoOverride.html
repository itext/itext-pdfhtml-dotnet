<!doctype html>
<html lang="en">
<head>
  <title>Flexbox justify-content examples</title>
  <style>
    body {font-family: sans-serif;}
    .stage {display: flex; border: 1px solid #ccc; width: 700px;}
    .box {background: lightblue; padding: 20px; border: 1px solid #333;}
  </style>
</head>
<body>
  <h1>Flexbox justify-content examples</h1>

  <div class="example">
    <h2>space-evenly</h2>
    <div class="stage" style="justify-content: space-evenly;">
      <div class="box" style="width: 120px; height: 150px;">Item 1</div>
      <div class="box" style="width: 50px; height: 50px;">Item 2</div>
      <div class="box">Item 3</div>
    </div>
  </div>

  <div class="example">
    <h2>margin: auto overriding justify-content: space-evenly</h2>
    <div class="stage" style="justify-content: space-evenly;">
      <div class="box" style="width: 120px; height: 50px;">Item 1</div>
      <div class="box" style="margin-left: auto;">Item 2 (margin-left:auto)</div>
    </div>
  </div>

</body>
</html>
