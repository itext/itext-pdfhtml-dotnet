<!doctype html>
<html lang="en">
<head>
  <title>Flexbox justify-content (space values) with flex-wrap</title>
  <style>
    body {font-family: sans-serif; margin: 20px;}
    .container {
      display: flex;
      flex-wrap: no-wrap; 
      border: 2px solid #444;
      margin-bottom: 40px;
      padding: 10px;
      width: 400px; 
    }
    .box {
      background: lightcoral;
      padding: 20px;
      border: 1px solid #333;
      width: 100px;
      text-align: center;
      margin: 5px;
    }
    h2 {margin: 10px 0;}
  </style>
</head>
<body>
  <h1>Flexbox justify-content (space values) with flex-wrap</h1>

  <h2>justify-content: space-between</h2>
  <div class="container" style="justify-content: space-between;">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
  </div>

  <h2>justify-content: space-around</h2>
  <div class="container" style="justify-content: space-around;">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
  </div>

  <h2>justify-content: space-evenly</h2>
  <div class="container" style="justify-content: space-evenly;">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
  </div>

</body>
</html>
