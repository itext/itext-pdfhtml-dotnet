<!doctype html>
<html lang="en">
<head>
  <title>Flex Direction Examples</title>
  <style>
    body {font-family: sans-serif; margin: 20px;}
    .container {
      display: flex;
	  /* Stretch behaves like flex or flex-start, if we want to stretch in flex-box we have to use flex-grow. */
	  justify-content: stretch;
      border: 1px solid #ccc;
      gap: 10px;
      width: 1000px; 
    }
    .box {
      background: lightgreen;
      padding: 10px;
      border: 1px solid #333;
      text-align: center;
	  height: 100px;
    }
  </style>
</head>
<body>
  <h1>Flexbox Row and Column Examples</h1>

  <h2>Flex Row - justify-content: stretch</h2>
  <div class="container" style="flex-direction: row;">
    <div class="box" style="width: 200px;">1</div>
    <div class="box" >2</div>
    <div class="box" style="width: 30px; height: 200px;">3</div>
  </div>

  <h2>Flex Column - justify-content: stretch</h2>
  <div class="container" style="flex-direction: column;">
    <div class="box" style="width: 200px;">1</div>
    <div class="box" style="width: 30px; height: 40px;">2</div>
    <div class="box" >3</div>
  </div>
  
  <h2>Flex Row Reverse - justify-content: stretch</h2>
  <div class="container" style="flex-direction: row-reverse;">
    <div class="box" style="width: 200px;">1</div>
    <div class="box" >2</div>
    <div class="box" style="width: 30px; height: 200px;">3</div>
  </div>

  <h2>Flex Column Reverse - justify-content: stretch</h2>
  <div class="container" style="flex-direction: column-reverse;">
    <div class="box" style="width: 200px;">1</div>
    <div class="box" style="width: 30px; height: 40px;">2</div>
    <div class="box" >3</div>
  </div>

</body>
</html>
