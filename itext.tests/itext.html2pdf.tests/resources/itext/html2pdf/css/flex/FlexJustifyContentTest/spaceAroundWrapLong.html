<!doctype html>
<html lang="en">
<head>
  <title>Flexbox space-around + flex-wrap with many items</title>
  <style>
    body {font-family: sans-serif; margin: 20px;}
    .container {
      display: flex;
      flex-wrap: wrap; 
      justify-content: space-around; 
      border: 2px solid #444;
      padding: 10px;
      width: 250px; 
      min-height: 300px;
    }
    .box {
      width: 100px;
      height: 350px;
      background: lightblue;
      border: 1px solid #333;
      text-align: center;
      line-height: 80px;
      margin: 5px 0; 
      font-weight: bold;
    }
    h2 {margin: 10px 0;}
  </style>
</head>
<body>
  <h1>Flexbox space-around + flex-wrap with many items</h1>

  <h2>justify-content: space-around; flex-wrap: wrap</h2>
  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
    <div class="box">9</div>
    <div class="box">10</div>
    <div class="box">11</div>
    <div class="box">12</div>
    <div class="box">13</div>
    <div class="box">14</div>
    <div class="box">15</div>
    <div class="box">16</div>
    <div class="box">17</div>
    <div class="box">18</div>
    <div class="box">19</div>
    <div class="box">20</div>
  </div>

</body>
</html>
