<!doctype html>
<html lang="en">
<head>
  <title>Flexbox justify-content inheritance & resets with parent containers</title>
  <style>
    body {font-family: sans-serif; margin: 20px;}
    .parent {display: flex; border: 2px solid #444; margin-bottom: 20px;}
    .container {display: flex; border: 1px solid #666; margin-bottom: 30px; height: 150px; width: 500px;}
    .box {background: lightcoral; padding: 20px; border: 1px solid #333; width: 60px; text-align: center;}
    h2 {margin-bottom: 10px;}
  </style>
</head>
<body>
  <h1>Flexbox justify-content inheritance & resets with parent containers</h1>

  <h2>Flex Row - justify-content: initial</h2>
  <div class="container" style="flex-direction: row; justify-content: initial;">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>

  <h2>Flex Column - justify-content: initial</h2>
  <div class="container" style="flex-direction: column; justify-content: initial; height: 300px;">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>
  
  <h2>Flex Row Reverse- justify-content: initial</h2>
  <div class="container" style="flex-direction: row-reverse; justify-content: initial;">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>

  <h2>Flex Column Reverse - justify-content: initial</h2>
  <div class="container" style="flex-direction: column-reverse; justify-content: initial; height: 300px;">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>
</body>
</html>
