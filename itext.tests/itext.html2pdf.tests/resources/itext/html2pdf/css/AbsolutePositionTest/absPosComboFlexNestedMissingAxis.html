<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>flex nested absolute missing axis</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 600px;
    background: #fafbfc;
    font-family: monospace;
    font-size: 11px;
  }

  .outer-absolute {
    position: absolute;
    top: 30px;
    left: 30px;
    width: 560px;
    height: 320px;
    background: #2563eb;
    padding: 10px;
  }

  .middle-flex {
    position: relative;
    display: flex;
    justify-content: space-around;
    align-items: center;
    width: 100%;
    height: 220px;
    background: #db2777;
    padding: 10px;
    gap: 10px;
  }

  .flex-sibling {
    background: #f472b6;
    color: white;
    padding: 8px;
    width: 100px;
    height: 60px;
  }

  .absolute-missing-axis-in-flex {
    position: absolute;
    right: 15px;
    bottom: 15px;
    width: 130px;
    height: 60px;
    background: #16a34a;
    color: white;
    padding: 6px 8px;
  }

  .absolute-no-offset-in-flex {
    position: absolute;
    width: 130px;
    height: 50px;
    background: #d97706;
    color: white;
    padding: 6px 8px;
  }

  .percentage-descendant {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 24px;
    background: #7c3aed;
    color: white;
    font-size: 9px;
    padding: 3px 4px;
  }
</style>
</head>
<body>
  <div class="outer-absolute">
    outer absolute
    <div class="middle-flex">
      flex container
      <div class="flex-sibling">flex sibling</div>
      <div class="absolute-missing-axis-in-flex">
        right + bottom only
        <div class="percentage-descendant">top:50% left:50%</div>
      </div>
      <div class="absolute-no-offset-in-flex">no offsets</div>
      <div class="flex-sibling">flex sibling</div>
    </div>
  </div>
</body>
</html>
