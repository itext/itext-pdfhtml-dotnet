<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>right + bottom only</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 600px;
    background: #fafbfc;
  }

  .box {
    position: absolute;
    right: 30px;
    bottom: 20px;
    width: 160px;
    height: 60px;
    background: #2563eb;
    color: white;
    font-family: monospace;
    font-size: 11px;
    padding: 6px 8px;
    line-height: 1.4;
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="box">right:30px<br>bottom:20px</div>
</body>
</html>
