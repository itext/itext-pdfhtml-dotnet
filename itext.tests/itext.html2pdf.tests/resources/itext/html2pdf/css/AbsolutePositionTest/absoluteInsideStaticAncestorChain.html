<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>static ancestor chain</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 600px;
    background: #fafbfc;
  }

  .static-wrapper-1 {
    padding: 30px;
    background: #e2e8f0;
  }
  .static-wrapper-2 {
    padding: 30px;
    background: #cbd5e1;
  }
  .static-wrapper-3 {
    padding: 30px;
    background: #94a3b8;
  }

  .box {
    position: absolute;
    top: 300px;
    width: 160px;
    height: 70px;
    background: #2563eb;
    color: white;
    font-family: monospace;
    font-size: 11px;
    padding: 6px 8px;
  }
</style>
</head>
<body>
  <div class="static-wrapper-1">
    static-wrapper-1
    <div class="static-wrapper-2">
      static-wrapper-2
      <div class="static-wrapper-3">
        static-wrapper-3
        <div class="box">top:300px<br>(anchors to viewport,<br>skips all static ancestors)</div>
      </div>
    </div>
  </div>
</body>
</html>
