<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>absolute relative absolute</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 600px;
    background: #fafbfc;
  }

  .level-0 {
    position: absolute;
    top: 30px;
    left: 30px;
    width: 480px;
    height: 280px;
    background: #2563eb;
  }

  .level-1 {
    position: relative;
    top: 15px;
    left: 25px;
    width: 360px;
    height: 180px;
    background: #db2777;
    margin: 20px;
  }

  .level-2 {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 140px;
    height: 60px;
    background: #16a34a;
  }

  .level-0, .level-1, .level-2 {
    color: white;
    font-family: monospace;
    font-size: 11px;
    padding: 6px 8px;
    line-height: 1.4;
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="level-0">
    L0 · absolute
    <div class="level-1">
      L1 · relative
      <div class="level-2">L2 · absolute</div>
    </div>
  </div>
</body>
</html>
