<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>absolute on list</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 600px;
    background: #fafbfc;
    font-family: monospace;
    font-size: 13px;
  }

  .container {
    position: relative;
    width: 500px;
    height: 220px;
    background: #cbd5e1;
    margin-bottom: 20px;
  }

  .list-absolute {
    position: absolute;
    left: 20px;
    width: 200px;
    background: #2563eb;
    color: white;
    margin: 0;
    padding: 8px 8px 8px 28px;
  }

  .container-2 {
    position: relative;
    width: 500px;
    height: 220px;
    background: #cbd5e1;
  }

  .list-normal {
    margin: 0;
    padding: 8px 8px 8px 28px;
    background: #e2e8f0;
  }

  .li-absolute {
    position: absolute;
    right: 20px;
    width: 180px;
    background: #d97706;
    color: white;
    padding: 4px 8px;
    list-style-position: inside;
  }
</style>
</head>
<body>
  <div class="container">
    <div style="width: 50px; height: 50px; border: solid black 1px"></div>
    <ul class="list-absolute">
      <li>first item</li>
      <li>second item</li>
      <li>third item</li>
    </ul>
  </div>

  <div class="container-2">
    <ol class="list-normal">
      <li>normal item one</li>
      <li class="li-absolute">absolute li, pulled out right:20px</li>
      <li>normal item three</li>
      <li>normal item four</li>
    </ol>
  </div>
</body>
</html>
