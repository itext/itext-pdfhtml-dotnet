<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Baseline Pattern</title>
<style>
  :is(.btn) {
    background: gray;
    color: white;
  }

  .btn.primary {
    background: blue;
  }

  .btn.danger {
    background: red;
  }
</style>
</head>
<body>

<button class="btn">Default</button>
<button class="btn primary">Primary</button>
<button class="btn danger">Danger</button>

</body>
</html>
