<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flex Direction + :is()</title>
<style>
  .container {
    display: flex;
    gap: 10px;
    border: 2px solid black;
    margin-bottom: 20px;
  }

  :is(.row, .column) {
    background: #f0f0f0;
    padding: 10px;
  }

  .row {
    flex-direction: row;
  }

  .column {
    flex-direction: column;
  }

  .item {
    background: steelblue;
    color: white;
    padding: 10px;
  }
</style>
</head>
<body>

<div class="container row">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
</div>

<div class="container column">
  <div class="item">A</div>
  <div class="item">B</div>
  <div class="item">C</div>
</div>

</body>
</html>
