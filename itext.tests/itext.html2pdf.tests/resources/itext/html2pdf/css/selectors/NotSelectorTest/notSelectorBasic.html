<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>:not() Test</title>
  <style>
    :not(h1, h3) {
      color: darkblue;
    }

    :not(#special) {
      border: 3px solid red;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h1>Heading 1</h1>
  <h2>Heading 2</h2>
  <h3>Heading 3</h3>

  <div class="box">Box (class)</div>
  <div id="special">Box (id)</div>

</body>
</html>
