<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .grid {
            display: grid;
            width: 100%;
        }

        .table {
            display: inline-table;
            width: 100%;
        }

        ul {
            list-style-position: inside;
        }
    </style>
</head>
<body>
<div class="grid">
    <div class="table">
        <div class="grid">
            <p>List with an inside marker:</p>
            <ul>
                <li>This item must have exactly one bullet.</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
