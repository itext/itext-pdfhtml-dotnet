<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .flex {
            display: flex;
            width: 100%;
        }

        ul {
            list-style-position: inside;
        }
    </style>
</head>
<body>
<div class="flex">
    <div class="flex">
        <p>List with an inside marker:</p>
        <ul>
            <li>This item must have exactly one bullet.</li>
        </ul>
    </div>
</div>
</body>
</html>
